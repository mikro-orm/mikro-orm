name: tests

on:
  push:
    branches: [ master, next, renovate/** ]
  pull_request:
    branches: [ master, next ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install
        run: yarn

      - name: Build
        run: yarn build

      - name: Check JSR publishing
        run: yarn publish:jsr --dry-run

  docs:
    name: Docs build
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install
        run: yarn

      - name: Check spelling (next docs)
        uses: crate-ci/typos@master
        with:
          files: docs/docs

      - name: Check spelling (versioned docs)
        uses: crate-ci/typos@master
        with:
          files: docs/versioned_docs

      - name: Build & deploy docs
        run: |
          cd docs
          yarn
          export MIKRO_ORM_DOCS_TESTING=1
          yarn build

  lint:
    name: Lint
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install
        run: yarn

      - name: Format check
        run: yarn oxfmt packages tests --check

      - name: Lint
        run: yarn lint

  test:
    name: Tests (node ${{ matrix.node-version }}, ${{ matrix.shard }}/4)
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        node-version: [ 22, 24, 26 ]
        shard: [ 1, 2, 3, 4 ]
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Enable corepack
        run: |
          npm install -g corepack@latest --force
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install & pull docker images
        run: |
          for i in 1 2 3; do docker compose pull && break || sleep $((i*15)); done &
          yarn
          wait

      - name: Init docker
        run: |
          # Start everything so all services boot in parallel.
          docker compose up -d
          rc=0
          # Wait for the reliable services to become healthy; a failure here is a
          # real problem, but route it through the diagnostics dump below.
          docker compose up -d --wait mongo mysql9 mariadb postgre postgis cockroachdb oracledb || rc=1

          # mssql 2025-CU3 intermittently crashes during early startup
          # (SQLPAL/lsass.exe segfault) and is recovered by `restart: always`.
          # `docker compose up --wait` aborts the moment it observes the restart
          # cycle, so poll the probe ourselves until mssql is *stably* reachable;
          # several consecutive successes rule out a pending crash-restart.
          ok=0
          for i in $(seq 1 72); do
            if docker compose exec -T mssql /opt/mssql-tools18/bin/sqlcmd -b -C -S tcp:localhost -U sa -P 'Root.Root' -Q 'select 1' >/dev/null 2>&1; then
              ok=$((ok + 1))
              [ "$ok" -ge 5 ] && break
            else
              [ "$ok" -gt 0 ] && echo "::warning::mssql probe failed after $ok consecutive successes; tolerating restart cycle"
              ok=0
            fi
            sleep 5
          done
          if [ "$ok" -lt 5 ]; then
            echo "::error::mssql did not stabilise within the startup window"
            rc=1
          fi

          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          set +e
          echo "::group::docker compose ps -a"
          docker compose ps -a
          echo "::endgroup::"
          for s in mongo mysql9 mariadb postgre postgis cockroachdb mssql oracledb; do
            cid=$(docker compose ps -aq "$s")
            echo "::group::$s logs"
            docker compose logs --tail=200 --no-color "$s"
            echo "::endgroup::"
            if [ -n "$cid" ]; then
              echo "::group::$s state"
              docker inspect "$cid" --format '{{json .State}}' | jq .
              echo "::endgroup::"
            fi
          done
          exit $rc

      - name: Set CC Required env vars
        run: export GIT_BRANCH=$GITHUB_HEAD_REF && export GIT_COMMIT_SHA=$(git rev-parse origin/$GITHUB_HEAD_REF)

      - name: Get number of CPU cores
        id: cpu-cores
        uses: SimenB/github-actions-cpu-cores@v3

      - name: Test
        if: matrix.node-version != 24
        run: |
          yarn test --max-workers ${{ steps.cpu-cores.outputs.count }} --shard ${{ matrix.shard }}/4
          git status && git diff
        env:
          RETRY_TESTS: 1

      - name: Coverage
        if: matrix.node-version == 24
        run: |
          yarn clean-tests
          yarn test --coverage --max-workers ${{ steps.cpu-cores.outputs.count }} --shard ${{ matrix.shard }}/4
          git status && git diff
        env:
          RETRY_TESTS: 1

      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Teardown docker
        run: docker compose down

  bench:
    name: Benchmarks
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install
        run: yarn

      - name: Test
        run: yarn bench

  bench-types:
    name: Type Benchmarks
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install
        run: yarn

      - name: Type performance benchmarks
        run: yarn bench:types

  test-windows:
    name: Tests (windows, node ${{ matrix.node-version }})
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: 'windows-2025-vs2026'
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 22, 24, 26 ]
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      - name: Enable corepack
        run: |
          npm install -g corepack@latest --force
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install
        run: yarn

      - name: Test (SQLite only)
        run: yarn test:sqlite

  test-deno:
    name: Tests (deno)
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # Yarn dependencies cannot be cached until yarn is installed
      # WORKAROUND: https://github.com/actions/setup-node/issues/531
      - name: Extract cached dependencies
        uses: actions/setup-node@v6
        with:
          cache: yarn

      - name: Install & build & pull docker images
        run: |
          for i in 1 2 3; do docker compose pull mongo && break || sleep $((i*15)); done &
          yarn
          yarn build
          wait

      - name: Init docker
        run: docker compose up -d mongo --wait

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Test (Deno + node:sqlite)
        run: deno run --allow-read --allow-write --allow-env --allow-ffi --node-modules-dir=manual tests/deno/sqlite.test.ts

      - name: Test (Deno + mongodb)
        run: deno run --allow-read --allow-write --allow-env --allow-net --allow-sys --node-modules-dir=manual tests/deno/mongodb.test.ts

  release:
    name: Release
    if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/next') && github.repository_owner == 'mikro-orm'
    runs-on: ubuntu-latest
    needs: [ build, test, lint, docs ]
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: lerna.json
          sparse-checkout-cone-mode: false

      - name: Determine dist-tag and canary bump
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/next" ]]; then
            MAJOR=$(jq -r '.version | split(".")[0]' lerna.json)
            echo "dist-tag=next-v${MAJOR}" >> "$GITHUB_OUTPUT"
            echo "canary-bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "dist-tag=next" >> "$GITHUB_OUTPUT"
            echo "canary-bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packages
        uses: apify/workflows/execute-workflow@main
        with:
          workflow: release.yml
          inputs: >
            {
              "ref": "${{ steps.commit.outputs.commit_long_sha || github.sha }}",
              "dist-tag": "${{ steps.tag.outputs.dist-tag }}",
              "canary-bump": "${{ steps.tag.outputs.canary-bump }}"
            }
